schema: 1

id: snip
version: "1.0.0"
desc: Get Screenshot of Monitor/window/selection

# Restrict to module scope in other perm catagories
permissions:
  - display
  - filesystem:
      - ~/Pictures

# Must be user authenticated
aliases:
  - screenshot

# Used for help messages, tab completions
usage:
  screen: Take Screenshot of screen
  active: Take Screenshot of active window
  area: Take screenshot of area

  _flags:
    "-o, --output": Output file path
    "-e, --ext": Output file extension

usage/screen:
  _flags:
    inherit: "commands"

  record: Record Screen instead of screenshot

usage/active:
  inherit: commands/screen

usage/area:
  inherit: commands/screen
